<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Units.css">
</head>
<body>

    <h1>CSS Units</h1>

    <section>
        
        <h2>Absolute Units</h2>

        <div class="px-box">200px</div>
        <div class="cm-box">5cm</div>
        <div class="mm-box">30mm</div>
        <div class="inch-box">2in</div>
        <div class="pt-box">20pt</div>

    </section>

    <section>

        <h2>Relative Units</h2>

        <div class="percent-box">80%</div>

        <div class="parent">

            Parent

            <div class="em-box">2em</div>
            <div class="rem-box">2rem</div>

        </div>

        <div class="vw-box">50w</div>
        <div class="vh-box">20vh</div>
        <div class="vim-box">20vim</div>
        <div class="vmax-box">20vmax</div>
        <div class="ch-box">30ch</div>
    </section>

</body>
</html>
