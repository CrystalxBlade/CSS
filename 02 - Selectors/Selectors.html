<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <h1>CSS Selectors</h1>

    <p>This is the first paragraph</p>

    <p class="highlight">
        This paragraph has a class.
    </p>

    <p id="special">
        This paragraph has ID.
    </p>

    <div class="container">

        <h2>Container Heading</h2>
        <p>Paragraph inside container</p>
        <span>Span inside container</span>

        <div>
            <p>Nested Paragraph</p>
        </div>

    </div>

    <h3>Sibling Heading</h3>

    <p>Adjacent paragraph</p>

    <p>General sibling paragraph</p>

    <input type="text" placeholder="Text">
    <input type="password" placeholder="Password">
    <input type="email" placeholder="Email">

</body>
</html>
